version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg15        # PostgreSQL 15 with pgvector pre-installed ✅
    container_name: tradie_migration_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tradie123
      POSTGRES_DB: tradie_migration
    ports:
      - "5432:5432"                       # Maps to localhost:5432
    volumes:
      - tradie_db_data:/var/lib/postgresql/data   # Data persists even if container restarts

volumes:
  tradie_db_data:
